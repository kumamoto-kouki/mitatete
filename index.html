<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mitatete</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main id="app" class="chat">
      <header class="chat__header">
        <h1 class="chat__title">Mitatete</h1>
        <button
          id="theme-toggle"
          class="theme-toggle"
          type="button"
          aria-label="ライト/ダークテーマを切り替え"
          title="テーマを切り替え"
        >
          <span
            class="theme-toggle__icon theme-toggle__icon--light"
            aria-hidden="true"
            ><i data-lucide="sun"></i
          ></span>
          <span
            class="theme-toggle__icon theme-toggle__icon--dark"
            aria-hidden="true"
            ><i data-lucide="moon"></i
          ></span>
          <span class="theme-toggle__label">テーマ</span>
        </button>
      </header>

      <!-- 原則8（固定）: AIであることを常時明示する — mtt-ai-banner 体裁 -->
      <div
        class="chat__disclosure mtt-ai-banner mtt-ai-banner--compact"
        role="note"
        aria-label="AI開示"
      >
        <span
          class="mtt-ai-banner__icon"
          id="disclosure-icon"
          aria-hidden="true"
        ></span>
        <div class="mtt-ai-banner__text">
          <b>これは AI による応答です。</b>
          <span>人の発言ではありません。</span>
        </div>
      </div>

      <!-- 設定ドロワー（既定は閉じた状態）: モデル/APIキー/キャラクター/日記 -->
      <details id="settings-drawer" class="settings-drawer">
        <summary class="settings-drawer__summary">設定</summary>
        <div class="settings-drawer__body">
          <!-- モデル選択・API キー設定パネル（model-ui.ts が描画） -->
          <aside
            id="model-panel"
            class="model-ui"
            aria-label="モデル設定"
          ></aside>

          <!-- プリセットキャラクター選択パネル（character-ui.ts が描画） -->
          <aside
            id="character-panel"
            class="character-panel"
            aria-label="キャラクター選択"
          ></aside>

          <!-- カスタムキャラクター作成フォーム（character-editor.ts が描画） -->
          <aside
            id="character-editor"
            class="character-editor"
            aria-label="カスタムキャラクター作成"
          ></aside>

          <!-- 観察日記パネル（diary.ts が描画・原則9） -->
          <aside
            id="diary-panel"
            class="diary-panel"
            aria-label="観察日記"
          ></aside>
        </div>
      </details>

      <section
        id="messages"
        class="chat__messages"
        aria-live="polite"
      ></section>

      <!-- 入力エリア: mtt-input 体裁 -->
      <div class="chat__composer-wrap">
        <form id="composer" class="chat__composer mtt-field">
          <div class="mtt-input" id="composer-input-wrap">
            <textarea
              id="input"
              class="chat__input mtt-input__ta"
              placeholder="メッセージを入力…"
              autocomplete="off"
              rows="1"
            ></textarea>
            <button
              class="chat__send mtt-send"
              type="submit"
              id="send-btn"
              aria-label="送信"
            >
              <span
                class="mtt-send__icon"
                id="send-icon"
                aria-hidden="true"
              ></span>
            </button>
          </div>
          <div class="mtt-field__foot">
            <span class="mtt-field__hint"
              >Enter で送信・Shift+Enter で改行</span
            >
          </div>
        </form>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/model-ui.ts"></script>
    <script type="module" src="/src/principles.ts"></script>
    <script type="module" src="/src/character-ui.ts"></script>
    <script type="module" src="/src/character-editor.ts"></script>
    <script type="module" src="/src/diary.ts"></script>
    <script type="module" src="/src/icons.ts"></script>
  </body>
</html>
