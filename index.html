<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mitatete</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main id="app" class="chat">
      <header class="chat__header">
        <h1 class="chat__title">Mitatete</h1>
        <!-- 原則8（固定）: AIであることを常時明示する -->
        <p class="chat__disclosure">これはAIアシスタントとの対話です。</p>
      </header>

      <!-- プリセットキャラクター選択パネル（character-ui.ts が描画） -->
      <aside
        id="character-panel"
        class="character-panel"
        aria-label="キャラクター選択"
      ></aside>

      <!-- カスタムキャラクター作成フォーム（character-editor.ts が描画） -->
      <aside
        id="character-editor"
        class="character-editor"
        aria-label="カスタムキャラクター作成"
      ></aside>

      <section
        id="messages"
        class="chat__messages"
        aria-live="polite"
      ></section>

      <form id="composer" class="chat__composer">
        <input
          id="input"
          class="chat__input"
          type="text"
          placeholder="メッセージを入力…"
          autocomplete="off"
        />
        <button class="chat__send" type="submit">送信</button>
      </form>
    </main>

    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/principles.ts"></script>
    <script type="module" src="/src/character-ui.ts"></script>
    <script type="module" src="/src/character-editor.ts"></script>
  </body>
</html>
