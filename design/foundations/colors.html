<!-- @dsCard group="Foundations" viewport="780x520" name="Color Tokens" subtitle="semantic カラートークン（ライト）／ダーク切替可" -->
<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mitatete — Color Tokens</title>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-base);
        -webkit-font-smoothing: antialiased;
      }
      .board {
        padding: 26px 30px 34px;
      }
      .board-head {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 22px;
      }
      .board-title {
        font-family: var(--font-display);
        font-size: 22px;
        font-weight: 700;
        margin: 0;
      }
      .board-sub {
        font-size: 14px;
        color: var(--text-muted);
      }
      .theme-toggle {
        margin-left: auto;
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 7px 12px;
        border-radius: var(--radius-pill);
        box-shadow: var(--shadow-sm);
      }
      .theme-toggle svg {
        width: 15px;
        height: 15px;
      }
      .group-label {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: var(--tracking-caps);
        text-transform: uppercase;
        color: var(--text-muted);
        margin: 0 0 12px;
      }
      .group-label + .group-label,
      .row + .group-label {
        margin-top: 24px;
      }

      .row {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
        gap: 12px;
      }
      .sw {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .sw .chip {
        height: 56px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
      }
      .sw .tk {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--text);
      }
      .sw .hex {
        font-family: var(--font-mono);
        font-size: 11.5px;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <div class="board">
      <div class="board-head">
        <div>
          <p class="board-title">Color Tokens</p>
          <span class="board-sub">直書き禁止 — var(--token) で参照する</span>
        </div>
        <button class="theme-toggle" id="tt">
          <i data-lucide="moon"></i><span>ダーク</span>
        </button>
      </div>

      <p class="group-label">Surface & Text</p>
      <div class="row">
        <div class="sw">
          <div class="chip" style="background: var(--bg)"></div>
          <span class="tk">--bg</span><span class="hex">背景</span>
        </div>
        <div class="sw">
          <div class="chip" style="background: var(--surface)"></div>
          <span class="tk">--surface</span><span class="hex">カード</span>
        </div>
        <div class="sw">
          <div class="chip" style="background: var(--surface-2)"></div>
          <span class="tk">--surface-2</span><span class="hex">面2</span>
        </div>
        <div class="sw">
          <div class="chip" style="background: var(--text)"></div>
          <span class="tk">--text</span><span class="hex">本文</span>
        </div>
        <div class="sw">
          <div class="chip" style="background: var(--text-muted)"></div>
          <span class="tk">--text-muted</span><span class="hex">補助</span>
        </div>
        <div class="sw">
          <div class="chip" style="background: var(--border)"></div>
          <span class="tk">--border</span><span class="hex">罫線</span>
        </div>
      </div>

      <p class="group-label">Accent（ブランド）</p>
      <div class="row">
        <div class="sw">
          <div class="chip" style="background: var(--accent)"></div>
          <span class="tk">--accent</span><span class="hex">差し色</span>
        </div>
        <div class="sw">
          <div class="chip" style="background: var(--accent-strong)"></div>
          <span class="tk">--accent-strong</span
          ><span class="hex">塗り(文字可)</span>
        </div>
        <div class="sw">
          <div class="chip" style="background: var(--accent-ink)"></div>
          <span class="tk">--accent-ink</span><span class="hex">文字</span>
        </div>
        <div class="sw">
          <div class="chip" style="background: var(--accent-soft)"></div>
          <span class="tk">--accent-soft</span><span class="hex">淡い面</span>
        </div>
      </div>

      <p class="group-label">State</p>
      <div class="row">
        <div class="sw">
          <div class="chip" style="background: var(--success)"></div>
          <span class="tk">--success</span><span class="hex">成功</span>
        </div>
        <div class="sw">
          <div class="chip" style="background: var(--warning)"></div>
          <span class="tk">--warning</span><span class="hex">注意</span>
        </div>
        <div class="sw">
          <div class="chip" style="background: var(--danger)"></div>
          <span class="tk">--danger</span><span class="hex">危険</span>
        </div>
        <div class="sw">
          <div class="chip" style="background: var(--info)"></div>
          <span class="tk">--info</span><span class="hex">情報/AI開示</span>
        </div>
        <div class="sw">
          <div class="chip" style="background: var(--info-soft)"></div>
          <span class="tk">--info-soft</span><span class="hex">情報/淡</span>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
      const tt = document.getElementById("tt");
      tt.addEventListener("click", () => {
        const dark =
          document.documentElement.getAttribute("data-theme") === "dark";
        document.documentElement.setAttribute(
          "data-theme",
          dark ? "light" : "dark"
        );
        tt.innerHTML = dark
          ? '<i data-lucide="moon"></i><span>ダーク</span>'
          : '<i data-lucide="sun"></i><span>ライト</span>';
        lucide.createIcons();
      });
    </script>
  </body>
</html>
