<!-- @dsCard group="States" viewport="820x440" name="Empty / Error / Loading" subtitle="会話なし / 送信失敗 / 読み込み中の表示" -->
<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mitatete — States</title>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-base);
        -webkit-font-smoothing: antialiased;
      }
      .board {
        padding: 26px 30px 34px;
      }
      .board-head {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 22px;
      }
      .board-title {
        font-family: var(--font-display);
        font-size: 22px;
        font-weight: 700;
        margin: 0;
      }
      .board-sub {
        font-size: 14px;
        color: var(--text-muted);
      }
      .theme-toggle {
        margin-left: auto;
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 7px 12px;
        border-radius: var(--radius-pill);
        box-shadow: var(--shadow-sm);
      }
      .theme-toggle svg {
        width: 15px;
        height: 15px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
      }
      @media (max-width: 760px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-card);
        padding: 26px 20px;
        min-height: 280px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 6px;
      }
      .plabel {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: var(--tracking-caps);
        text-transform: uppercase;
        color: var(--text-muted);
        margin: 0 0 8px;
      }

      .state-icon {
        width: 64px;
        height: 64px;
        border-radius: 20px;
        display: grid;
        place-items: center;
        margin-bottom: 8px;
      }
      .state-icon svg {
        width: 30px;
        height: 30px;
      }
      .state-icon--empty {
        background: var(--accent-soft);
        color: var(--accent-ink);
      }
      .state-icon--error {
        background: var(--danger-soft);
        color: var(--danger);
      }
      .state-title {
        font-family: var(--font-display);
        font-size: var(--text-lg);
        font-weight: 700;
        margin: 0;
      }
      .state-desc {
        font-size: 14px;
        color: var(--text-muted);
        line-height: 1.6;
        max-width: 26ch;
        margin: 0;
      }

      .mtt-btn {
        font-family: var(--font-base);
        font-weight: 700;
        font-size: var(--text-sm);
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 9px 15px;
        border-radius: var(--radius-sm);
        border: 1px solid transparent;
        cursor: pointer;
        margin-top: 10px;
      }
      .mtt-btn svg {
        width: 15px;
        height: 15px;
      }
      .mtt-btn--primary {
        background: var(--accent-strong);
        color: var(--on-accent);
      }
      .mtt-btn--secondary {
        background: var(--surface);
        color: var(--danger);
        border-color: color-mix(in srgb, var(--danger) 40%, transparent);
      }

      /* loading skeleton */
      .skel-rows {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 4px 6px;
      }
      .skel-msg {
        display: flex;
        gap: 10px;
        align-items: flex-start;
      }
      .skel-msg.right {
        flex-direction: row-reverse;
      }
      .skel-dot {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        flex: none;
      }
      .skel-lines {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .skel-msg.right .skel-lines {
        align-items: flex-end;
      }
      .skel-bar {
        height: 11px;
        border-radius: 6px;
      }
      .sk {
        position: relative;
        overflow: hidden;
        background: var(--surface-2);
      }
      .sk::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent,
          color-mix(in srgb, var(--surface) 60%, transparent),
          transparent
        );
        transform: translateX(-100%);
        animation: mtt-shimmer 1.3s infinite;
      }
      @keyframes mtt-shimmer {
        to {
          transform: translateX(100%);
        }
      }
      .loading-cap {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-size: 13px;
        color: var(--text-muted);
        margin-top: 4px;
      }
      .loading-cap .sp {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 2px solid var(--border-strong);
        border-top-color: var(--accent);
        animation: mtt-spin 0.7s linear infinite;
      }
      @keyframes mtt-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="board">
      <div class="board-head">
        <div>
          <p class="board-title">States</p>
          <span class="board-sub">empty / error / loading — 状態網羅</span>
        </div>
        <button class="theme-toggle" id="tt">
          <i data-lucide="moon"></i><span>ダーク</span>
        </button>
      </div>

      <div class="grid">
        <!-- empty -->
        <div>
          <p class="plabel">Empty — 会話なし</p>
          <div class="panel">
            <div class="state-icon state-icon--empty">
              <i data-lucide="message-circle-heart"></i>
            </div>
            <p class="state-title">まだ会話がありません</p>
            <p class="state-desc">
              クロ に話しかけてみましょう。今日あったことでも、相談ごとでも。
            </p>
            <button class="mtt-btn mtt-btn--primary">
              <i data-lucide="send"></i>話しかける
            </button>
          </div>
        </div>

        <!-- error -->
        <div>
          <p class="plabel">Error — 送信失敗</p>
          <div class="panel">
            <div class="state-icon state-icon--error">
              <i data-lucide="cloud-off"></i>
            </div>
            <p class="state-title">送信できませんでした</p>
            <p class="state-desc">
              接続が不安定なようです。少し待ってからもう一度お試しください。
            </p>
            <button class="mtt-btn mtt-btn--secondary">
              <i data-lucide="rotate-cw"></i>再送信
            </button>
          </div>
        </div>

        <!-- loading -->
        <div>
          <p class="plabel">Loading — 読み込み中</p>
          <div class="panel">
            <div class="skel-rows">
              <div class="skel-msg">
                <div class="skel-dot sk"></div>
                <div class="skel-lines">
                  <div class="skel-bar sk" style="width: 80%"></div>
                  <div class="skel-bar sk" style="width: 55%"></div>
                </div>
              </div>
              <div class="skel-msg right">
                <div class="skel-dot sk"></div>
                <div class="skel-lines">
                  <div class="skel-bar sk" style="width: 60%"></div>
                </div>
              </div>
            </div>
            <span class="loading-cap"
              ><span class="sp"></span>会話を読み込んでいます…</span
            >
          </div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
      const tt = document.getElementById("tt");
      tt.addEventListener("click", () => {
        const dark =
          document.documentElement.getAttribute("data-theme") === "dark";
        document.documentElement.setAttribute(
          "data-theme",
          dark ? "light" : "dark"
        );
        tt.innerHTML = dark
          ? '<i data-lucide="moon"></i><span>ダーク</span>'
          : '<i data-lucide="sun"></i><span>ライト</span>';
        lucide.createIcons();
      });
    </script>
  </body>
</html>
